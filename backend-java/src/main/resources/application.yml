server:
  port: 8080

spring:
  application:
    name: agenthub-api
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:mysql://localhost:3306/agenthub}
    username: ${SPRING_DATASOURCE_USERNAME:agenthub}
    password: ${SPRING_DATASOURCE_PASSWORD:agenthub_dev_password}
  flyway:
    enabled: true
    locations: classpath:db/migration
  data:
    redis:
      host: ${SPRING_DATA_REDIS_HOST:localhost}
      port: ${SPRING_DATA_REDIS_PORT:6379}

management:
  endpoints:
    web:
      exposure:
        include: health,info

mybatis:
  mapper-locations: classpath*:mapper/**/*.xml
  type-aliases-package: com.agenthub.model
  configuration:
    map-underscore-to-camel-case: true

agenthub:
  auth:
    jwt-secret: ${JWT_SECRET:t6Qz3Jd+R1bXpN8vY2kM5wA0cF4gH7jK9lL0mN3oP6qS9tU1vW2xY5zA8bC4dE7fG0hI3jK6lM9nO2pQ5rT8uV1wX4yZ7a}
    aes-key: ${AES_KEY:change-me-32-byte-base64-or-secret}
    internal-service-token: ${INTERNAL_SERVICE_TOKEN:change-me-internal-service-token}

logging:
  level:
    com.agenthub: INFO
